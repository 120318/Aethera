name: Feature request
description: Propose a focused Aethera capability or workflow improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Aethera focuses on media subscriptions, resource search, release selection,
        download dispatch, file transfer, media scraping, library import, and media server integration.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: What are you trying to do, and why is the current workflow not enough?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired user-visible behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Subscription
        - Resource search
        - Release selection policy
        - Download dispatch
        - File transfer or naming
        - Media scraping or NFO generation
        - Danmu generation
        - Media server integration
        - Configuration or setup
        - Web UI
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround or alternatives
      description: What do you do today? Are there tools or workflows Aethera should integrate with?
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this feature explicitly not do?
      placeholder: "For example: it should not replace an indexer, downloader, or media server."
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Add screenshots, mockups, links, sample filenames, or config examples if useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have checked existing issues and discussions for similar requests.
          required: true
        - label: This request is within Aethera's media automation scope.
          required: true
        - label: This request does not ask Aethera to provide media resources or tracker access.
          required: true
